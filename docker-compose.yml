services:
  api:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=challenge;Username=postgres;Password=postgres
    depends_on:
      - postgres

  frontend:
     build:
       context: ./front-end
       dockerfile: Dockerfile
     ports:
       - "5173:5173"
     volumes:
       - ./front-end:/app
       - /app/node_modules
     depends_on:
       - api

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: challenge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: